name = "zephyr-scanner-api"
main = "src/index.ts"
compatibility_date = "2026-05-01"
compatibility_flags = ["nodejs_compat"]

routes = [
  { pattern = "api.zephyr.build", custom_domain = true }
]

[vars]
ENVIRONMENT = "production"
SCANNER_VERSION = "0.1.0"

[observability]
enabled = true

# ─── Storage bindings ────────────────────────────────────────────────
# Provisioned 2026-05-21 via wrangler create commands.
# Local `wrangler dev` uses built-in emulators; production hits these.

[[kv_namespaces]]
binding = "SCANS"
id = "34c42dd1e134479187e1127aa5d43fb4"
preview_id = "5ad10b6298e440bf85a02aa3a9935056"

[[r2_buckets]]
binding = "REPORTS"
bucket_name = "zephyr-reports"

[[d1_databases]]
binding = "DB"
database_name = "zephyr"
database_id = "65f3ab50-4bea-4176-b9b3-537cabd06a7e"
migrations_dir = "migrations"
