name = "zephyr-scanner-api"
main = "src/index.ts"
compatibility_date = "2026-05-01"
compatibility_flags = ["nodejs_compat"]

# CUTOVER NOTE: the api.isyourstoreagentready.com custom domain is only
# provisioned when this branch is deployed AND the isyourstoreagentready.com
# zone is already in the Cloudflare account. Add the zone in the dashboard
# before merging/deploying, or this deploy will fail. api.zephyr.build is kept
# alongside during the transition so existing references don't break.
routes = [
  { pattern = "api.isyourstoreagentready.com", custom_domain = true },
  { pattern = "api.zephyr.build", custom_domain = true }
]

[vars]
ENVIRONMENT = "production"
SCANNER_VERSION = "0.1.0"

[observability]
enabled = true

# Bundle .ttf font files as Data modules (ArrayBuffer imports) so the OG
# image renderer (resvg-wasm) has fonts to draw text with. Without an
# embedded font, resvg renders shapes but no glyphs.
[[rules]]
type = "Data"
globs = ["**/*.ttf"]
fallthrough = true

# Daily change-detection cron — re-scans every zephyr-alerts subscriber's
# domain, diffs against scan_history, posts zephyr_score_changed events
# back to marketing.weaverse.io when regression/improvement/critical flip.
[triggers]
crons = ["0 2 * * *"]

# ─── Storage bindings ────────────────────────────────────────────────
# Provisioned 2026-05-21 via wrangler create commands.
# Local `wrangler dev` uses built-in emulators; production hits these.

[[kv_namespaces]]
binding = "SCANS"
id = "34c42dd1e134479187e1127aa5d43fb4"
preview_id = "5ad10b6298e440bf85a02aa3a9935056"

[[r2_buckets]]
binding = "REPORTS"
bucket_name = "zephyr-reports"

[[d1_databases]]
binding = "DB"
database_name = "zephyr"
database_id = "65f3ab50-4bea-4176-b9b3-537cabd06a7e"
migrations_dir = "migrations"
